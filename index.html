<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#b8860b">
<meta name="description" content="CCR Church App - Prayer, Schedule, Library, Bible Reading, Giving & More">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>CCR</title>
<link rel="manifest" href="manifest.json">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/app.css">
</head>
<body>

<!-- App Container -->
<div id="app"></div>

<!-- Floating Action Button Navigation -->
<div id="fab-nav" style="display:none;">
  <button class="fab-trigger" id="fabTrigger" aria-label="Open menu">
    <span class="fab-trigger-icon">☰</span>
  </button>
  <div class="fab-menu" id="fabMenu">
    <button class="fab-item" data-page="prayer" aria-label="Prayer">
      <span class="fab-icon">🙏</span>
      <span class="fab-label">Prayer</span>
    </button>
    <button class="fab-item" data-page="giving" aria-label="Giving">
      <span class="fab-icon">💰</span>
      <span class="fab-label">Giving</span>
    </button>
    <button class="fab-item" data-page="library" aria-label="Library">
      <span class="fab-icon">📚</span>
      <span class="fab-label">Library</span>
    </button>
    <button class="fab-item" data-page="bible" aria-label="Bible">
      <span class="fab-icon">📖</span>
      <span class="fab-label">Bible</span>
    </button>
    <button class="fab-item" data-page="sermons" aria-label="Sermons">
      <span class="fab-icon">🎧</span>
      <span class="fab-label">Sermons</span>
    </button>
    <button class="fab-item" data-page="schedule" aria-label="Schedule">
      <span class="fab-icon">📅</span>
      <span class="fab-label">Schedule</span>
    </button>
    <button class="fab-item" data-page="more" aria-label="More">
      <span class="fab-icon">☰</span>
      <span class="fab-label">More</span>
    </button>
  </div>
</div>

<!-- More Menu Overlay -->
<div class="more-menu-overlay" id="moreMenuOverlay">
  <div class="more-menu-content">
    <h2>More</h2>
    <button class="more-menu-item" data-page="bulletin">
      <span class="more-menu-icon">📋</span>
      <span>Bulletin</span>
    </button>
    <button class="more-menu-item" data-page="vote">
      <span class="more-menu-icon">🗳️</span>
      <span>Giving Vote</span>
    </button>
    <button class="more-menu-item" data-page="settings">
      <span class="more-menu-icon">⚙️</span>
      <span>Settings</span>
    </button>
    <button class="more-menu-close" id="moreMenuClose">Close</button>
  </div>
</div>

<!-- JavaScript Modules -->
<script src="js/app.js"></script>
<script src="js/auth.js"></script>
<script src="js/prayer.js"></script>
<script src="js/schedule.js"></script>
<script src="js/bulletin.js"></script>
<script src="js/bible.js"></script>
<script src="js/library.js"></script>
<script src="js/giving.js"></script>
<script src="js/vote.js"></script>
<script src="js/sermons.js"></script>
<script src="js/settings.js"></script>

<!-- Service Worker Registration -->
<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('/sw.js')
      .then(reg => console.log('SW registered:', reg))
      .catch(err => console.log('SW registration failed:', err));
  });
}
</script>

</body>
</html>
